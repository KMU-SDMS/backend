service: kmu-sdms-api
frameworkVersion: "4"

plugins:
  - serverless-offline

package:
  individually: true
  patterns:
    - "src/**"
    - "docs/**"
    - "!serverless.yml"
    - "!node_modules/**"
    - "!package*.json"
    - "!README.md"
    - "!legacy_web_scraper/**"
    - "!layer/**"
    - "!envs/**"
    - "envs/firebase-service-account.json"
    - "!.git/**"
    - "!.gitignore"
    - "!requirements.txt"
    - "!.vscode/**"
    - "!__pycache__/**"
    - "!**/__pycache__/**"

provider:
  name: aws
  runtime: python3.11
  region: ap-northeast-2
  timeout: 25
  memorySize: 512
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors:
      allowedOrigins:
        - "http://localhost:8080"
        - "https://kmusds.surge.sh"
        - "https://student-app-sigma-red.vercel.app"
      allowedHeaders:
        - "Content-Type"
        - "Authorization"
        - "Cookie"
      allowedMethods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
      allowCredentials: true
      maxAge: 86400
    authorizers:
      cookieAuth:
        type: request
        functionName: cookieAuthorizer
        identitySource:
          - "$request.header.Cookie"
        authorizerPayloadFormatVersion: 2.0
        enableSimpleResponses: true
  environment:
    STAGE: ${self:provider.stage}
    SUPABASE_URL: ${file(envs/config.${self:provider.stage}.json):SUPABASE_URL}
    SUPABASE_API_KEY: ${file(envs/config.${self:provider.stage}.json):SUPABASE_API_KEY}
    API_GATEWAY_ID: ${file(envs/config.${self:provider.stage}.json):API_GATEWAY_ID}
    BILL_BUCKET_NAME: ${file(envs/config.${self:provider.stage}.json):BILL_BUCKET_NAME}
    FCM_SERVICE_ACCOUNT_PATH: ${file(envs/config.${self:provider.stage}.json):FCM_SERVICE_ACCOUNT_PATH}
    FCM_PROJECT_ID: ${file(envs/config.${self:provider.stage}.json):FCM_PROJECT_ID}
    WEBHOOK_SECRET: ${file(envs/config.${self:provider.stage}.json):WEBHOOK_SECRET}
    COGNITO_DOMAIN: ${file(envs/config.${self:provider.stage}.json):COGNITO_DOMAIN}
    COGNITO_CLIENT_ID: ${file(envs/config.${self:provider.stage}.json):COGNITO_CLIENT_ID}
    COGNITO_CLIENT_SECRET: ${file(envs/config.${self:provider.stage}.json):COGNITO_CLIENT_SECRET}
    CALLBACK_URI: ${file(envs/config.${self:provider.stage}.json):CALLBACK_URI}
    SIGNED_OUT_URI: ${file(envs/config.${self:provider.stage}.json):SIGNED_OUT_URI}
    ALLOWED_REDIRECT_ORIGINS: ${file(envs/config.${self:provider.stage}.json):ALLOWED_REDIRECT_ORIGINS}
    # COOKIE_DOMAIN: ${file(envs/config.${self:provider.stage}.json):COOKIE_DOMAIN}
    COOKIE_SECURE: ${file(envs/config.${self:provider.stage}.json):COOKIE_SECURE}

layers:
  AppDependencies:
    path: layer
    name: ${self:provider.stage}-app-dependencies
    description: "스마트 기숙사 관리 시스템 Python 의존성"
    compatibleRuntimes:
      - python3.11

functions:
  cookieAuthorizer:
    handler: src.handlers.authorizer_handler.cookie_authorizer
    name: ${self:provider.stage}-auth-CookieAuthorizer
    layers:
      - { Ref: AppDependenciesLambdaLayer }

  docsUI:
    handler: src.handlers.docs_handler.serve_swagger_ui
    events:
      - httpApi:
          method: get
          path: /docs

  openapiSpec:
    handler: src.handlers.docs_handler.serve_openapi
    events:
      - httpApi:
          method: get
          path: /openapi.yml

  getRooms:
    name: ${self:provider.stage}-api-getRooms
    handler: src.handlers.rooms_handler.get_all
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: get
          path: /rooms
          authorizer:
            name: cookieAuth

  getNotices:
    name: ${self:provider.stage}-api-getNotices
    handler: src.handlers.notices_handler.get_paginated
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: get
          path: /notices
          authorizer:
            name: cookieAuth

  getNoticeById:
    name: ${self:provider.stage}-api-getNoticeByID
    handler: src.handlers.notices_handler.get_one
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: get
          path: /notice
          authorizer:
            name: cookieAuth

  getStudents:
    name: ${self:provider.stage}-api-getStudents
    handler: src.handlers.students_handler.get_students
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: get
          path: /students
          authorizer:
            name: cookieAuth

  getStudent:
    name: ${self:provider.stage}-api-getStudent
    handler: src.handlers.students_handler.get_by_student_no
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: get
          path: /student
          authorizer:
            name: cookieAuth

  createStudent:
    name: ${self:provider.stage}-api-createStudent
    handler: src.handlers.students_handler.create
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: post
          path: /student
          authorizer:
            name: cookieAuth

  updateStudent:
    name: ${self:provider.stage}-api-updateStudent
    handler: src.handlers.students_handler.update
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: put
          path: /student
          authorizer:
            name: cookieAuth

  deleteStudent:
    name: ${self:provider.stage}-api-deleteStudent
    handler: src.handlers.students_handler.delete
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: delete
          path: /student
          authorizer:
            name: cookieAuth

  createNotice:
    name: ${self:provider.stage}-api-createNotice
    handler: src.handlers.notices_handler.create
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: post
          path: /notice
          authorizer:
            name: cookieAuth

  deleteNotice:
    name: ${self:provider.stage}-api-deleteNotice
    handler: src.handlers.notices_handler.delete
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: delete
          path: /notice
          authorizer:
            name: cookieAuth

  updateNotice:
    name: ${self:provider.stage}-api-updateNotice
    handler: src.handlers.notices_handler.update
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: put
          path: /notice
          authorizer:
            name: cookieAuth

  getCalendar:
    name: ${self:provider.stage}-api-getCalendar
    handler: src.handlers.calendar_handler.get_all
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: get
          path: /calendar
          authorizer:
            name: cookieAuth

  createCalendar:
    name: ${self:provider.stage}-api-createCalendar
    handler: src.handlers.calendar_handler.create
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: post
          path: /calendar
          authorizer:
            name: cookieAuth

  updateCalendar:
    name: ${self:provider.stage}-api-updateCalendar
    handler: src.handlers.calendar_handler.update
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
