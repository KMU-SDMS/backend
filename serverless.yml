  # FCM 구독 관리 API
  createSubscription:
    name: ${self:provider.stage}-api-createSubscription
    handler: src.handlers.subscriptions_handler.create_subscription_handler
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: post
