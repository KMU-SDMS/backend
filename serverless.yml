          path: /calendar
          authorizer:
            name: cookieAuth

  deleteCalendar:
    name: ${self:provider.stage}-api-deleteCalendar
    handler: src.handlers.calendar_handler.delete
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: delete
          path: /calendar
          authorizer:
            name: cookieAuth

  billPresign:
    name: ${self:provider.stage}-api-billPresign
    handler: src.handlers.bill_handler.presign
    layers:
      - { Ref: AppDependenciesLambdaLayer }
    events:
      - httpApi:
          method: post
          path: /bill/presign
          authorizer:
