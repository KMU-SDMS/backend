# GitHub Actions 워크플로우의 이름
name: Deploy to AWS Lambda

# 워크플로우가 실행될 조건 (트리거)
on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch: {} # ← 수동 실행 버튼

# 실행될 작업(Job)들의 목록
jobs:
  deploy:
    # 작업의 이름
    name: Build and Deploy to ${{ github.ref_name }}
    # 작업이 실행될 가상 환경
    runs-on: ubuntu-latest
    # 수동 실행 때도 혹시 다른 브랜치를 선택 못 하게 안전장치 (선택)
    if: ${{ github.ref_name == 'dev' || github.ref_name == 'prod' }}
    # 환경변수 설정
    env:
      STAGE: ${{ github.ref_name == 'prod' && 'prod' || 'dev' }}
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

    # 작업의 단계(Step)들
    steps:
      # 1. 저장소의 코드를 가상 환경으로 가져오기 (Checkout)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 환경 설정 (Serverless Framework 설치용)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Python 3.11 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. AWS 자격 증명 설정
      # GitHub Secrets에 저장된 AWS 키를 사용하여 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 5. Serverless Framework v4 및 npm 의존성 설치
      - name: Install dependencies
        run: |
          npm install -g serverless@4
          npm install

      # 6-1. dev 환경 설정 파일 생성
      - name: Create DEV environment file
        if: env.STAGE == 'dev'
        run: |
          mkdir -p envs
          printf %s "${{ secrets.DEV_CONFIG_JSON }}" | base64 --decode > envs/config.dev.json

      # 6-2. prod 환경 설정 파일 생성 (이후 실제 PROD DB 연결이 필요함)
      - name: Create PROD environment file
        if: env.STAGE == 'prod'
        run: |
          mkdir -p envs
          printf %s "${{ secrets.PROD_CONFIG_JSON }}" | base64 --decode > envs/config.prod.json

      # 7. Python Lambda Layer 빌드
      - name: Build Python Layer
        run: |
          python3 -m pip install --upgrade pip
          mkdir -p layer/python
          python3 -m pip install \
            --platform manylinux2014_x86_64 \
            --target=./layer/python \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: --upgrade \
            -r requirements.txt
          # 빌드 검증
          ls -la layer/python/ | head -5

      # 7-1. AWS CLI 설치 (ECR 로그인용)
      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install
          aws --version

      # 7-2. Docker 이미지 빌드 및 ECR 푸시
      - name: Build and Push Docker Image to ECR
        run: |
          # config 파일에서 BILL_OCR_IMAGE_URI 추출
          # BILL_OCR_IMAGE_URI 형식: 169615918165.dkr.ecr.ap-northeast-2.amazonaws.com/ocr-lambda-dev:latest
          BILL_OCR_IMAGE_URI=$(cat envs/config.${{ env.STAGE }}.json | grep -o '"BILL_OCR_IMAGE_URI": "[^"]*"' | cut -d'"' -f4)
          
          # 이미지 URI에서 리포지토리 부분 추출 (예: 169615918165.dkr.ecr.ap-northeast-2.amazonaws.com)
          ECR_REPO=$(echo $BILL_OCR_IMAGE_URI | sed 's|/.*||')
          
          # ECR 로그인
          aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin $ECR_REPO
          
          # Docker 이미지 빌드
          DOCKER_BUILDKIT=0 docker build --platform linux/amd64 -t ocr-lambda-${{ env.STAGE }} .
          
          # Docker 이미지 태그 (BILL_OCR_IMAGE_URI를 그대로 사용)
          docker tag ocr-lambda-${{ env.STAGE }}:latest $BILL_OCR_IMAGE_URI
          
          # ECR에 푸시
          docker push $BILL_OCR_IMAGE_URI

      # 8. Firebase Service Account JSON 파일 생성 (base64 디코딩)
      - name: Create Firebase Service Account JSON
        if: env.STAGE == 'dev'
        run: printf %s "${{ secrets.DEV_FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 --decode > envs/dev-firebase-service-account.json
      - name: Create Firebase Service Account JSON
        if: env.STAGE == 'prod'
        run: printf %s "${{ secrets.PROD_FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 --decode > envs/prod-firebase-service-account.json

      # 9. Serverless Framework v4를 사용하여 AWS에 배포
      - name: Deploy to AWS (${{ env.STAGE }})
        run: sls deploy --stage ${{ env.STAGE }}
