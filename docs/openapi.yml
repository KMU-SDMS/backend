                invalidType:
                  value:
                    error: "Invalid bill type. Must be one of: water, electricity, gas"
        "404":
          description: 이미지를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "No image found for the specified criteria."
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/bills:
    get:
      summary: 종료일 기준 관리비 목록 조회
      description: 특정 종료일(endDate)을 기준으로 관리비 목록을 조회합니다. 관리자와 학생 모두 조회 가능합니다.
      tags:
        - Bills
      parameters:
        - name: endDate
          in: query
          description: 종료 일자 (YYYY-MM-DD 형식)
          required: true
          schema:
            type: string
            format: date
          example: "2025-11-30"
      responses:
        "200":
          description: 관리비 목록이 성공적으로 반환되었습니다. 학번을 키로 하는 딕셔너리 형태로 반환됩니다.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        nullable: true
                      studentNo:
                        type: string
                      type:
                        type: string
                        enum: [water, electricity, gas]
                      amount:
                        type: number
                        nullable: true
                      endDate:
                        type: string
                        format: date
                        nullable: true
                      bankInfo:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            bank_name:
                              type: string
                            bank_number:
                              type: string
                      is_paid:
                        type: boolean
                        nullable: true
              example:
                "20240001":
                  - id: 1
                    studentNo: "20240001"
                    type: "water"
                    amount: 50000
                    endDate: "2025-11-30"
                    bankInfo:
                      - bank_name: "국민은행"
                        bank_number: "123456789012"
                    is_paid: false
                  - id: 2
                    studentNo: "20240001"
                    type: "electricity"
                    amount: 30000
                    endDate: "2025-11-30"
                    bankInfo: null
                    is_paid: false
                "20240002":
                  - id: 3
                    studentNo: "20240002"
                    type: "water"
                    amount: 45000
                    endDate: "2025-11-30"
                    bankInfo: null
                    is_paid: true
        "400":
          description: 잘못된 요청 (endDate 파라미터 누락 또는 날짜 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingParam:
                  value:
                    warning: "endDate is required."
                invalidFormat:
                  value:
                    warning: "endDate must be in YYYY-MM-DD format."
        "401":
          description: 인증 실패 (로그인 필요)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                warning: "Unauthorized."
        "404":
          description: 해당 종료일의 관리비를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                warning: "Not found."
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/bill/paid/image:
    get:
      summary: 관리비 납부 완료 이미지 조회
      description: 저장된 관리비 납부 완료 이미지를 조회하기 위한 임시 다운로드 URL을 발급합니다. 발급된 URL은 5분간 유효합니다. 관리자는 학번을 파라미터로 추가하여 학생 납부 완료 이미지를 조회할 수 있습니다. 학생은 학번 파라미터를 추가하지 않고 조회하면 자신의 납부 완료 이미지를 조회할 수 있습니다.
      tags:
        - Bills
      parameters:
        - name: roomId
          in: query
          description: 호실 번호
          required: true
          schema:
            type: string
          example: "101"
        - name: type
          in: query
          description: 관리비 유형
          required: true
          schema:
            type: string
            enum: [water, electricity, gas]
          example: "water"
        - name: year
          in: query
          description: 연도
          required: true
          schema:
            type: string
          example: "2025"
        - name: month
          in: query
          description: 월
          required: true
          schema:
            type: string
          example: "9"
        - name: studentNo
          in: query
          description: 학생 번호
          required: false
          schema:
            type: string
            example: "20243105"
      responses:
        "200":
          description: 이미지 정보가 성공적으로 반환되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillImageResponse"
        "400":
          description: 잘못된 요청 (필수 쿼리 파라미터 누락 또는 유효하지 않은 값)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingParam:
                  value:
                    error: "roomId is required."
                invalidType:
                  value:
                    error: "Invalid bill type. Must be one of: water, electricity, gas"
        "404":
          description: 이미지를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "No image found for the specified criteria."
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    get:
      summary: Cognito Hosted UI 로그인 시작
      description: 절대 URL(화이트리스트 오리진)로 리디렉트 정보를 담아 로그인 플로우를 시작합니다. 서버는 PKCE와 state를 설정하고 Cognito Hosted UI로 302 리다이렉트합니다.
      tags:
        - Auth
      security: []
      deprecated: true
      parameters:
        - name: redirect
          in: query
          description: 로그인 완료 후 리다이렉트할 절대 URL (허용 오리진만)
          required: false
          schema:
            type: string
          examples:
            admin:
              value: "https://kmusds.surge.sh/home"
            student:
              value: "https://student-app-sigma-red.vercel.app/home"
            local:
              value: "http://localhost:3000/docs"
      responses:
        "302":
          description: Cognito Hosted UI로 리다이렉트

  /auth/callback:
    get:
      summary: Cognito 콜백
      description: Cognito가 Authorization Code와 state를 전달하는 엔드포인트. 서버는 코드 교환 후 `session` 쿠키를 설정하고 최초 요청된 redirect(허용 오리진)로 302 리다이렉트하며, 미허용 또는 누락 시 기본 경로로 폴백합니다.
      tags:
        - Auth
      security: []
      deprecated: true
      responses:
        "302":
          description: 로그인 완료 후 최종 리다이렉트
        "400":
          description: state/code 오류

  /api/rollcalls:
    get:
      summary: 점호 기록 조회
      description: 필터링된 점호 기록을 조회합니다. 날짜, 호실, 학생 이름, 출석 여부로 필터링할 수 있습니다.
      tags:
        - Rollcalls
      parameters:
        - name: date
          in: query
          description: 점호 날짜 (YYYY-MM-DD 형식)
          required: false
          schema:
            type: string
            format: date
          example: "2025-11-16"
        - name: roomId
          in: query
          description: 호실 번호
          required: false
          schema:
            type: integer
          example: 101
        - name: name
          in: query
          description: 학생 이름 (부분 일치)
          required: false
          schema:
            type: string
          example: "홍길동"
        - name: present
          in: query
          description: 출석 여부 (true=출석만, false=결석만)
          required: false
          schema:
            type: boolean
          example: true
      responses:
        "200":
          description: 성공적으로 점호 기록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rollcall"
        "400":
          description: 잘못된 요청 (파라미터 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/rollcall:
    post:
      summary: 점호 기록 생성/수정 (Upsert)
      description: 점호 기록을 생성하거나 수정합니다. 같은 학생의 같은 날짜에 이미 기록이 있으면 수정하고, 없으면 생성합니다.
      tags:
        - Rollcalls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollcallCreateRequest"
            example:
              studentId: "20240001"
              date: "2025-11-16"
              present: true
              note: "사감실 확인"
      responses:
        "200":
          description: 점호 기록이 성공적으로 생성/수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rollcall"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: 점호 기록 부분 수정
      description: 점호 기록의 출석 여부나 비고를 부분 수정합니다.
      tags:
        - Rollcalls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollcallUpdateRequest"
            example:
              id: 1
              present: false
              note: "병가로 변경"
      responses:
        "200":
          description: 점호 기록이 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rollcall"
        "400":
          description: 잘못된 요청 (ID 형식 오류 또는 필수 필드 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 점호 기록을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 점호 기록 삭제
      description: 특정 점호 기록을 삭제합니다.
      tags:
        - Rollcalls
      parameters:
        - name: id
          in: query
          description: 삭제할 점호 기록 ID
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: 점호 기록이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Rollcall deleted successfully"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 점호 기록을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/points:
    get:
      summary: 상벌점 이력 조회
      description: 상벌점 이력을 조회합니다. 학생 번호와 날짜 범위로 필터링할 수 있습니다.
      tags:
        - Points
      parameters:
        - name: studentId
          in: query
          description: 학생 학번
          required: false
          schema:
            type: string
          example: "20240001"
        - name: dateFrom
          in: query
          description: 시작 날짜 (YYYY-MM-DD 형식)
          required: false
          schema:
            type: string
            format: date
          example: "2025-11-01"
        - name: dateTo
          in: query
          description: 종료 날짜 (YYYY-MM-DD 형식)
          required: false
          schema:
            type: string
            format: date
          example: "2025-11-16"
      responses:
        "200":
          description: 성공적으로 상벌점 이력을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Point"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 상벌점 단건 부여
      description: 특정 학생에게 상벌점을 부여합니다.
      tags:
        - Points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointCreateRequest"
            example:
              studentId: "20240001"
              type: "MERIT"
              score: 3
              reason: "청소 우수"
              date: "2025-11-16"
      responses:
        "201":
          description: 상벌점이 성공적으로 부여되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Point"
        "400":
          description: 잘못된 요청 (필수 필드 누락, type/score 유효성 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/points/bulk:
    post:
      summary: 상벌점 대량 부여
      description: 여러 학생에게 동일한 상벌점을 대량으로 부여합니다. 트랜잭션 처리로 전체 성공 또는 전체 실패를 보장합니다.
      tags:
        - Points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointBulkCreateRequest"
            example:
              studentIds: ["20240001", "20240002", "20240003"]
              type: "DEMERIT"
              score: 1
              reason: "소음"
              date: "2025-11-16"
      responses:
        "201":
          description: 상벌점이 성공적으로 대량 부여되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointBulkCreateResponse"
        "400":
          description: 잘못된 요청 (studentIds 빈 배열, type/score 유효성 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 존재하지 않는 학생 학번 포함 (일부라도)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    get:
      summary: 로그아웃
      description: 요청의 redirect 파라미터(절대 URL)가 허용 오리진이며 Cognito에 사전 등록된 로그아웃 URL 목록에 존재하면 해당 URL로 최종 리다이렉트합니다. 조건 불일치 시 기본 로그아웃 경로로 폴백합니다.
      tags:
        - Auth
      security: []
      deprecated: true
      parameters:
        - name: redirect
          in: query
          description: 로그아웃 완료 후 리다이렉트할 절대 URL (허용 오리진 + Cognito 등록 URL)
          required: false
          schema:
            type: string
          examples:
            admin:
              value: "https://kmusds.surge.sh/auth"
            student:
              value: "https://student-app-sigma-red.vercel.app/auth"
            local:
              value: "http://localhost:3000/auth"
      responses:
        "302":
          description: 로그아웃 처리 후 최종 리다이렉트 또는 Cognito 로그아웃으로 리다이렉트
        "400":
          description: redirect 누락/허용되지 않은 오리진
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    WebhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
      description: 웹훅 인증을 위한 시크릿 키

  schemas:
    Room:
      type: object
      description: 호실 정보
      properties:
        id:
          type: integer
          description: 호실 ID
          example: 1
        name:
          type: string
          description: 호실명 (예 101호)
          example: "101호"
        floor:
          type: integer
          description: 층수
          example: 1
        headcount:
          type: integer
          description: 수용 인원
          example: 4

    Student:
      type: object
      description: 학생 정보
      properties:
        id:
          type: integer
          description: 학생 ID
          example: 1
        name:
          type: string
          description: 학생명
          example: "홍길동"
        studentIdNum:
          type: string
          description: 학번
          example: "20240001"
        affiliation:
          type: string
          description: 소속
          example: "공과대학"
        major:
          type: string
          description: 전공
          example: "컴퓨터공학부"
        roomNumber:
          type: integer
          description: 호실 번호
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식)
          example: "2024-09-01"
        checkOutDate:
          type: string
          format: date
          description: 퇴사 날짜 (YYYY-MM-DD 형식)
          example: "2025-02-28"
        createdAt:
          type: string
          format: date-time
          description: 생성일시
          example: "2024-09-01T10:00:00Z"

    StudentCreateRequest:
      type: object
      description: 학생 생성 요청
      required:
        - name
        - studentIdNum
      properties:
        name:
          type: string
          description: 학생명
          example: "이현구"
        studentIdNum:
          type: string
          description: 학번
          example: "20243105"
        roomNumber:
          type: integer
          description: 호실 번호 (선택사항)
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2024-02-26"
        checkOutDate:
          type: string
          format: date
          description: 퇴사 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2024-08-31"

    StudentUpdateRequest:
      type: object
      description: 학생 수정 요청
      required:
        - studentIdNum
      properties:
        studentIdNum:
