  /api/bill/presign:
    post:
      summary: 관리비 고지서 업로드 URL 발급
      description: S3에 관리비 고지서 이미지를 업로드하기 위한 임시 presigned URL을 발급합니다. 발급된 URL은 5분간 유효합니다. 관리자가 요청할시 관리비 고지서 업로드 URL이 발급됩니다. 학생이 요청할시 관리비 납부 완료 업로드 URL이 발급됩니다. 관리자가 관리비 납부 이미지 업로드 전 캘린더에 해당 년월의 납부 마감일정을 등록하여야합니다.
      tags:
        - Bills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillPresignRequest"
            example:
              contentType: "image/jpeg"
              ext: "jpg"
              roomId: "101"
              type: "water"
              year: "2025"
              month: "9"
      responses:
        "200":
          description: Presigned URL이 성공적으로 발급되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillPresignResponse"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 유효하지 않은 값), 관리자가 관리비 납부 이미지 업로드 전 캘린더에 해당 년월의 납부 마감일정을 등록하여야합니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingField:
                  value:
                    error: "roomId is required."
                invalidType:
                  value:
                    error: "Invalid bill type. Must be one of: water, electricity, gas"
                invalidContentType:
                  value:
                    error: "contentType 'image/bmp' not allowed"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/bill:
    patch:
      summary: 관리비 수정
      description: 관리비를 수정합니다. 관리비 유형(`type`)은 필수이며, `amount`, `bankInfo`, `endDate`, `is_paid`는 선택적으로 부분 수정할 수 있습니다. 관리자는 학생 번호(`studentNo`)를 body에 추가하여 학생의 관리비를 수정할 수 있습니다. 학생은 학생 번호(`studentNo`)를 body에 추가하지 않고 조회하면 자신의 관리비를 수정할 수 있습니다. 또한 학생은 요청 본문에 `type`과 `is_paid`만 포함하여 본인의 납부 상태(`is_paid`)만 수정할 수 있습니다.
      tags:
        - Bills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                studentNo:
                  type: string
                  description: 학생 번호
                  example: "20243105"
                type:
                  type: string
                  description: 관리비 유형
                  enum: [water, electricity, gas]
                  example: "water"
                amount:
                  type: number
                  description: 관리비 금액
                  example: 100000
                bankInfo:
                  type: array
                  description: 계좌 정보 목록
                  items:
                    type: object
                    properties:
                      bank:
                        type: string
                      account:
                        type: string
                endDate:
                  type: string
                  format: date
                  description: 납부 마감일 (YYYY-MM-DD)
                  example: "2025-11-30"
                is_paid:
                  type: boolean
                  description: 관리자 확인 여부
                  example: true
            example:
              studentNo: "20243105"
              type: "water"
              amount: 100000
              bankInfo: [{ bank: "국민", account: "123456789012" }]
              endDate: "2025-11-30"
              is_paid: true
      responses:
        "200":
          description: 관리비가 성공적으로 수정되었습니다. true를 반환합니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 유효하지 않은 값)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 관리비를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "No bill found for the specified student number."
        "401":
          description: 인증 실패 (관리자 권한 필요)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized."
    get:
      summary: 학생 관리비 조회
      description: 관리자는 학생 번호로 관리비를 조회합니다. 학생은 자신의 관리비를 조회합니다.
      tags:
        - Bills
      parameters:
        - name: studentNo
          in: query
          description: 학생 번호
          required: false
          schema:
            type: string
          example: "20243105"
      responses:
        "200":
          description: 관리비 정보가 성공적으로 반환되었습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      nullable: true
                    studentNo:
                      type: string
                    type:
                      type: string
                      enum: [water, electricity, gas]
                    amount:
                      type: number
                      nullable: true
                    endDate:
                      type: string
                      format: date
                      nullable: true
                    bankInfo:
                      type: array
                      items:
                        type: object
                        properties:
                          bank_name:
                            type: string
                          bank_number:
                            type: string
        "400":
          description: 잘못된 요청 (필수 쿼리 파라미터 누락 또는 유효하지 않은 값)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingParam:
                  value:
                    error: "studentNo is required."
                invalidType:
                  value:
                    error: "Invalid student number format."
        "404":
          description: 관리비를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "No bill found for the specified student number."
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
