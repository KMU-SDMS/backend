openapi: 3.0.3
info:
  title: KMU SDMS API
  version: "1.0.0"
  description: |
    국민대학교 스마트 기숙사 관리 시스템 API
    먼저 로그인을 통해 세션을 발급받아야 합니다.

    http://localhost:3000/auth/login

    1. 위 링크에 접속해서 로그인 플로우를 시작합니다.
    2. 로그인 성공 후 이 OpenAPI 문서로 리다이렉트 됩니다.
  contact:
    name: KMU SDMS Team

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://{apiId}.execute-api.ap-northeast-2.amazonaws.com
    description: Production server
    variables:
      apiId:
        default: ${env:API_GATEWAY_ID}

paths:
  /api/rooms:
    get:
      summary: 전체 호실 목록 조회
      description: 시스템에 등록된 모든 호실의 목록을 반환합니다.
      tags:
        - Rooms
      responses:
        "200":
          description: 성공적으로 호실 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/students:
    get:
      summary: 학생 목록 조회
      description: 전체 또는 특정 호실의 학생 목록을 조회합니다.
      tags:
        - Students
      parameters:
        - name: roomNumber
          in: query
          description: 호실 번호 (기본값 101, 없으면 전체 조회)
          required: false
          schema:
            type: integer
            minimum: 1
          example: 101
      responses:
        "200":
          description: 성공적으로 학생 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (잘못된 roomNumber 형식)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/student:
    get:
      summary: 특정 학생 조회
      description: 학생 번호를 통해 특정 학생의 상세 정보를 조회합니다.
      tags:
        - Students
      parameters:
        - name: studentIdNum
          in: query
          description: 조회할 학생의 학번
          required: true
          schema:
            type: string
          example: "20243105"
      responses:
        "200":
          description: 성공적으로 학생 정보를 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (studentIdNum 파라미터 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 학생 생성
      description: 새로운 학생을 생성합니다.
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentCreateRequest"
            example:
              name: "이현구"
              studentIdNum: "20243105"
              roomNumber: 101
              checkInDate: "2024-02-26"
              checkOutDate: "2024-08-31"
      responses:
        "201":
          description: 학생이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 학생 정보 수정
      description: 기존 학생의 정보를 수정합니다.
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdateRequest"
            example:
              studentIdNum: "20243105"
              name: "이현구"
              roomNumber: 101
              checkInDate: "2024-02-27"
              checkOutDate: "2024-08-31"
      responses:
        "200":
          description: 학생 정보가 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 학생 삭제
      description: 특정 학생을 삭제합니다.
      tags:
        - Students
      parameters:
        - name: studentIdNum
          in: query
          description: 삭제할 학생의 학번
          required: true
          schema:
            type: string
          example: "20243105"
      responses:
        "200":
          description: 학생이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student deleted successfully"
        "400":
          description: 잘못된 요청 (studentIdNum 파라미터 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/overnight-stay:
    post:
      summary: 외박 신청 생성
      description: 학생이 외박을 신청합니다. 학기당 승인된 외박은 최대 3회까지 허용되며, 동시에 하나의 대기중 신청만 존재할 수 있습니다. 학번은 세션 정보에서 자동으로 추출됩니다.
      tags:
        - OvernightStays
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OvernightStayCreateRequest"
            example:
              startDate: "2025-11-24"
              endDate: "2025-11-25"
              reason: "청소 점호 탈주"
              semester: "2025-2"
      responses:
        "201":
          description: 외박 신청이 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OvernightStay"
        "400":
          description: 잘못된 요청 (학기당 제한 초과, 날짜 오류 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      summary: 내 외박 신청 내역 조회
      description: 학생이 현재 학기의 외박 신청 내역과 요약 정보를 조회합니다. 학번은 세션 정보에서 자동으로 추출됩니다.
      tags:
        - OvernightStays
      parameters: []
      responses:
        "200":
          description: 외박 신청 목록과 요약 정보가 반환되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OvernightStayStudentList"
        "400":
          description: 잘못된 요청 (필수 파라미터 누락 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/overnight-stays:
    get:
      summary: 외박 신청 목록 조회 (사감용)
      description: 사감이 외박 신청 목록을 조회합니다. 학기와 학번으로 필터링할 수 있으며 페이지네이션을 지원합니다.
      tags:
        - OvernightStays
      parameters:
        - name: semester
          in: query
          required: false
          description: 학기 필터 (2025-2)
          schema:
            type: string
        - name: studentIdNum
          in: query
          required: false
          description: 학번 필터
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 페이지 번호 (기본값 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: 페이지 크기 (기본값 10)
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: 외박 신청 목록이 반환되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OvernightStayAdminList"
        "400":
          description: 잘못된 요청 (페이지 번호/크기 오류 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: 외박 신청 승인/거부
      description: 사감이 외박 신청을 승인하거나 거부합니다.
      tags:
        - OvernightStays
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OvernightStayStatusUpdateRequest"
            example:
              id: 1
              status: "approved"
      responses:
        "200":
          description: 외박 신청 상태가 업데이트되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OvernightStay"
        "400":
          description: 잘못된 요청 (허용되지 않은 상태 값 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 외박 신청을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notices:
    get:
      summary: 공지사항 목록 조회 (페이지네이션)
      description: |
        페이지네이션을 통해 공지사항 목록을 조회합니다. 페이지당 10개의 공지사항을 반환합니다.
        기본적으로 PUBLISHED 상태의 공지사항만 반환됩니다.
      tags:
        - Notices
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (기본값 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        "200":
          description: 성공적으로 공지사항 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  notices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notice"
                  page_info:
                    $ref: "#/components/schemas/PageInfo"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notices/filter:
    get:
      summary: 공지사항 필터링 및 정렬 조회
      description: 다양한 조건으로 공지사항을 필터링하고 정렬하여 페이지네이션으로 조회합니다.
      tags:
        - Notices
      parameters:
        - name: status
          in: query
          description: |
            공지사항 상태 (여러 개 선택 가능)
            - 여러 개 선택 방법 1: 같은 파라미터를 여러 번 사용 (?status=DRAFT&status=SCHEDULED)
            - 여러 개 선택 방법 2 (스웨거에서 불가): 쉼표로 구분 (?status=DRAFT,SCHEDULED)
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [DRAFT, SCHEDULED, PUBLISHED]
          style: form
          explode: true
          allowEmptyValue: false
          examples:
            single:
              summary: 단일 상태
              value: PUBLISHED
            multiple_repeated:
              summary: 여러 상태 (반복 파라미터)
              value:
                - DRAFT
                - SCHEDULED
        - name: is_important
          in: query
          description: 중요 공지 여부
          required: false
          schema:
            type: boolean
          example: true
        - name: start_date
          in: query
          description: 검색 시작일 (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: 검색 종료일 (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
        - name: year
          in: query
          description: 특정 연도
          required: false
          schema:
            type: integer
        - name: month
          in: query
          description: 특정 월
          required: false
          schema:
            type: integer
        - name: day
          in: query
          description: 특정 일
          required: false
          schema:
            type: integer
        - name: sort
          in: query
          description: 정렬 순서
          required: false
          schema:
            type: string
            enum: [latest, oldest]
            default: "latest"
        - name: page
          in: query
          description: 페이지 번호
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: search
          in: query
          description: 검색어 (제목 또는 내용에서 검색)
          required: false
          schema:
            type: string
          example: "장학금"
      responses:
        "200":
          description: 성공적으로 필터링된 공지사항 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  notices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notice"
                  page_info:
                    $ref: "#/components/schemas/PageInfo"
        "400":
          description: 잘못된 요청 (유효하지 않은 파라미터)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notice:
    get:
      summary: 특정 공지사항 조회
      description: ID를 통해 특정 공지사항의 상세 정보를 조회합니다.
      tags:
        - Notices
      parameters:
        - name: id
          in: query
          description: 조회할 공지사항의 ID
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: 성공적으로 공지사항을 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 공지사항 생성
      description: 새로운 공지사항을 생성합니다.
      tags:
        - Notices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeCreateRequest"
            example:
              title: "정전 안내"
              content: "9월 20일 오전 10시에 정전 예정입니다."
              is_important: true
              status: "PUBLISHED"
      responses:
        "201":
          description: 공지사항이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 공지사항 수정
      description: 기존 공지사항의 내용을 수정합니다.
      tags:
        - Notices
      parameters:
        - name: id
          in: query
          description: 수정할 공지사항의 ID
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeCreateRequest"
            example:
              title: "정전 안내 (수정)"
              content: "9월 20일 오전 10시에 정전 예정입니다. (시간 변경)"
              is_important: false
      responses:
        "200":
          description: 공지사항이 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (ID 형식 오류 또는 필수 필드 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 공지사항 삭제
      description: 특정 공지사항을 삭제합니다.
      tags:
        - Notices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: 삭제할 공지사항의 ID
                  example: 23
              required:
                - id
            example:
              id: 23
      responses:
