openapi: 3.0.3
info:
  title: KMU SDMS API
  version: "1.0.0"
  description: |
    국민대학교 스마트 기숙사 관리 시스템 API
    Serverless Framework + AWS HTTP API 기반
  contact:
    name: KMU SDMS Team

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://{apiId}.execute-api.ap-northeast-2.amazonaws.com
    description: Production server
    variables:
      apiId:
        default: ${env:API_GATEWAY_ID}
      # stage:
      #   default: dev

paths:
  /rooms:
    get:
      summary: 전체 호실 목록 조회
      description: 시스템에 등록된 모든 호실의 목록을 반환합니다.
      tags:
        - Rooms
      responses:
        "200":
          description: 성공적으로 호실 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /students:
    get:
      summary: 학생 목록 조회
      description: 전체 또는 특정 호실의 학생 목록을 조회합니다.
      tags:
        - Students
      parameters:
        - name: roomNumber
          in: query
          description: 호실 번호 (기본값 101, 없으면 전체 조회)
          required: false
          schema:
            type: integer
            minimum: 1
          example: 101
      responses:
        "200":
          description: 성공적으로 학생 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (잘못된 roomNumber 형식)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /student:
    get:
      summary: 특정 학생 조회
      description: 학생 번호를 통해 특정 학생의 상세 정보를 조회합니다.
      tags:
        - Students
      parameters:
        - name: studentIdNum
          in: query
          description: 조회할 학생의 학번
          required: true
          schema:
            type: string
          example: "20243105"
      responses:
        "200":
          description: 성공적으로 학생 정보를 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (studentIdNum 파라미터 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 학생 생성
      description: 새로운 학생을 생성합니다.
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentCreateRequest"
            example:
              name: "이현구"
              studentIdNum: "20243105"
              roomNumber: 101
              checkInDate: "2024-02-26"
      responses:
        "201":
          description: 학생이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 학생 정보 수정
      description: 기존 학생의 정보를 수정합니다.
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdateRequest"
            example:
              studentIdNum: "20243105"
              name: "이현구"
              roomNumber: 101
              checkInDate: "2024-02-27"
      responses:
        "200":
          description: 학생 정보가 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 학생 삭제
      description: 특정 학생을 삭제합니다.
      tags:
        - Students
      parameters:
        - name: studentIdNum
          in: query
          description: 삭제할 학생의 학번
          required: true
          schema:
            type: string
          example: "20243105"
      responses:
        "200":
          description: 학생이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student deleted successfully"
        "400":
          description: 잘못된 요청 (studentIdNum 파라미터 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notices:
    get:
      summary: 공지사항 목록 조회 (페이지네이션)
      description: 페이지네이션을 통해 공지사항 목록을 조회합니다. 페이지당 10개의 공지사항을 반환합니다.
      tags:
        - Notices
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (기본값 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        "200":
          description: 성공적으로 공지사항 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notice"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notice:
    get:
      summary: 특정 공지사항 조회
      description: ID를 통해 특정 공지사항의 상세 정보를 조회합니다.
      tags:
        - Notices
      parameters:
        - name: id
          in: query
          description: 조회할 공지사항의 ID
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: 성공적으로 공지사항을 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 공지사항 생성
      description: 새로운 공지사항을 생성합니다.
      tags:
        - Notices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeCreateRequest"
            example:
              title: "정전 안내"
              content: "9월 20일 오전 10시에 정전 예정입니다."
              is_important: true
      responses:
        "201":
          description: 공지사항이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 공지사항 수정
      description: 기존 공지사항의 내용을 수정합니다.
      tags:
        - Notices
      parameters:
        - name: id
          in: query
          description: 수정할 공지사항의 ID
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeCreateRequest"
            example:
              title: "정전 안내 (수정)"
              content: "9월 20일 오전 10시에 정전 예정입니다. (시간 변경)"
              is_important: false
      responses:
        "200":
          description: 공지사항이 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (ID 형식 오류 또는 필수 필드 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 공지사항 삭제
      description: 특정 공지사항을 삭제합니다.
      tags:
        - Notices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: 삭제할 공지사항의 ID
                  example: 23
              required:
                - id
            example:
              id: 23
      responses:
        "200":
          description: 공지사항이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Notice deleted successfully"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /calendar:
    get:
      summary: 캘린더 일정 조회
      description: 전체 또는 특정 날짜의 캘린더 일정을 조회합니다.
      tags:
        - Calendar
      parameters:
        - name: date
          in: query
          description: 조회할 날짜 (YYYY-MM-DD 형식, 선택사항)
          required: false
          schema:
            type: string
            format: date
          example: "2025-09-19"
      responses:
        "200":
          description: 성공적으로 캘린더 일정을 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarList"
        "400":
          description: 잘못된 요청 (잘못된 날짜 형식)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 캘린더 일정 생성
      description: 새로운 캘린더 일정을 생성합니다.
      tags:
        - Calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarCreateRequest"
            example:
              date: "2025-09-19"
              rollCallType: null
              paymentType: null
      responses:
        "201":
          description: 캘린더 일정이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calendar"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 캘린더 일정 수정
      description: 기존 캘린더 일정의 내용을 수정합니다.
      tags:
        - Calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarUpdateRequest"
            example:
              id: 1
              paymentType: "cash"
      responses:
        "200":
          description: 캘린더 일정이 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calendar"
        "400":
          description: 잘못된 요청 (ID 형식 오류 또는 필수 필드 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 캘린더 일정을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 캘린더 일정 삭제
      description: 특정 캘린더 일정을 삭제합니다.
      tags:
        - Calendar
      parameters:
        - name: id
          in: query
          description: 삭제할 캘린더 일정의 ID
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: 캘린더 일정이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Calendar event deleted successfully"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 캘린더 일정을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Room:
      type: object
      description: 호실 정보
      properties:
        id:
          type: integer
          description: 호실 ID
          example: 1
        name:
          type: string
          description: 호실명 (예 101호)
          example: "101호"
        floor:
          type: integer
          description: 층수
          example: 1
        headcount:
          type: integer
          description: 수용 인원
          example: 4

    Student:
      type: object
      description: 학생 정보
      properties:
        id:
          type: integer
          description: 학생 ID
          example: 1
        name:
          type: string
          description: 학생명
          example: "홍길동"
        studentIdNum:
          type: string
          description: 학번
          example: "20240001"
        affiliation:
          type: string
          description: 소속
          example: "공과대학"
        major:
          type: string
          description: 전공
          example: "컴퓨터공학부"
        roomNumber:
          type: integer
          description: 호실 번호
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식)
          example: "2024-09-01"
        createdAt:
          type: string
          format: date-time
          description: 생성일시
          example: "2024-09-01T10:00:00Z"

    StudentCreateRequest:
      type: object
      description: 학생 생성 요청
      required:
        - name
        - studentIdNum
      properties:
        name:
          type: string
          description: 학생명
          example: "이현구"
        studentIdNum:
          type: string
          description: 학번
          example: "20243105"
        roomNumber:
          type: integer
          description: 호실 번호 (선택사항)
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2024-02-26"

    StudentUpdateRequest:
      type: object
      description: 학생 수정 요청
      required:
        - studentIdNum
      properties:
        studentIdNum:
          type: string
          description: 학번
          example: "20243105"
        name:
          type: string
          description: 학생명 (선택사항)
          example: "이현구"
        roomNumber:
          type: integer
          description: 호실 번호 (선택사항)
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2024-02-27"

    Notice:
      type: object
      description: 공지사항 정보
      properties:
        id:
          type: integer
          description: 공지사항 ID
          example: 1
        title:
          type: string
          description: 제목
          example: "정전 안내"
        content:
          type: string
          description: 내용
          example: "9월 20일 오전 10시에 정전 예정입니다."
        date:
          type: string
          format: date
          description: 작성일 (YYYY-MM-DD 형식)
          example: "2024-09-15"
        is_important:
          type: boolean
          description: 중요 공지 여부
          example: true

    NoticeCreateRequest:
      type: object
      description: 공지사항 생성/수정 요청
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: 공지사항 제목
          example: "정전 안내"
        content:
          type: string
          description: 공지사항 내용
          example: "9월 20일 오전 10시에 정전 예정입니다."
        is_important:
          type: boolean
          description: 중요 공지 여부
          default: false
          example: true

    Calendar:
      type: object
      description: 캘린더 일정 정보
      properties:
        id:
          type: integer
          description: 일정 ID
          example: 1
        date:
          type: string
          format: date
          description: 일정 날짜 (YYYY-MM-DD 형식)
          example: "2025-09-19"
        rollCallType:
          type: string
          description: 점호 타입
          example: "night"
        paymentType:
          type: string
          description: 결제 타입
          example: "card"

    CalendarList:
      type: object
      description: 캘린더 일정 목록
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Calendar"

    CalendarCreateRequest:
      type: object
      description: 캘린더 일정 생성 요청
      required:
        - date
        - rollCallType
        - paymentType
      properties:
        date:
          type: string
          format: date
          description: 일정 날짜 (YYYY-MM-DD 형식)
          example: "2025-09-19"
        rollCallType:
          type: string
          description: 점호 타입
          example: "night"
        paymentType:
          type: string
          description: 결제 타입
          example: "card"

    CalendarUpdateRequest:
      type: object
      description: 캘린더 일정 수정 요청
      required:
        - id
      properties:
        id:
          type: integer
          description: 수정할 일정 ID
          example: 1
        date:
          type: string
          format: date
          description: 일정 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2025-09-19"
        rollCallType:
          type: string
          description: 점호 타입 (선택사항)
          example: "night"
        paymentType:
          type: string
          description: 결제 타입 (선택사항)
          example: "cash"

    Error:
      type: object
      description: 에러 응답
      properties:
        error:
          type: string
          description: 에러 메시지
          example: "Invalid request parameters"

