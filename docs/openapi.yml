openapi: 3.0.3
info:
  title: KMU SDMS API
  version: "1.0.0"
  description: |
    국민대학교 스마트 기숙사 관리 시스템 API
    먼저 로그인을 통해 세션을 발급받아야 합니다.

    http://localhost:3000/auth/login

    1. 위 링크에 접속해서 로그인 플로우를 시작합니다.
    2. 로그인 성공 후 이 OpenAPI 문서로 리다이렉트 됩니다.
  contact:
    name: KMU SDMS Team

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://{apiId}.execute-api.ap-northeast-2.amazonaws.com
    description: Production server
    variables:
      apiId:
        default: ${env:API_GATEWAY_ID}

paths:
  /api/rooms:
    get:
      summary: 전체 호실 목록 조회
      description: 시스템에 등록된 모든 호실의 목록을 반환합니다.
      tags:
        - Rooms
      responses:
        "200":
          description: 성공적으로 호실 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/students:
    get:
      summary: 학생 목록 조회
      description: 전체 또는 특정 호실의 학생 목록을 조회합니다.
      tags:
        - Students
      parameters:
        - name: roomNumber
          in: query
          description: 호실 번호 (기본값 101, 없으면 전체 조회)
          required: false
          schema:
            type: integer
            minimum: 1
          example: 101
      responses:
        "200":
          description: 성공적으로 학생 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (잘못된 roomNumber 형식)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/student:
    get:
      summary: 특정 학생 조회
      description: 학생 번호를 통해 특정 학생의 상세 정보를 조회합니다.
      tags:
        - Students
      parameters:
        - name: studentIdNum
          in: query
          description: 조회할 학생의 학번
          required: true
          schema:
            type: string
          example: "20243105"
      responses:
        "200":
          description: 성공적으로 학생 정보를 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (studentIdNum 파라미터 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 학생 생성
      description: 새로운 학생을 생성합니다.
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentCreateRequest"
            example:
              name: "이현구"
              studentIdNum: "20243105"
              roomNumber: 101
              checkInDate: "2024-02-26"
      responses:
        "201":
          description: 학생이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 학생 정보 수정
      description: 기존 학생의 정보를 수정합니다.
      tags:
        - Students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdateRequest"
            example:
              studentIdNum: "20243105"
              name: "이현구"
              roomNumber: 101
              checkInDate: "2024-02-27"
      responses:
        "200":
          description: 학생 정보가 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 학생 삭제
      description: 특정 학생을 삭제합니다.
      tags:
        - Students
      parameters:
        - name: studentIdNum
          in: query
          description: 삭제할 학생의 학번
          required: true
          schema:
            type: string
          example: "20243105"
      responses:
        "200":
          description: 학생이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student deleted successfully"
        "400":
          description: 잘못된 요청 (studentIdNum 파라미터 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 학생을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notices:
    get:
      summary: 공지사항 목록 조회 (페이지네이션)
      description: 페이지네이션을 통해 공지사항 목록을 조회합니다. 페이지당 10개의 공지사항을 반환합니다.
      tags:
        - Notices
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (기본값 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        "200":
          description: 성공적으로 공지사항 목록을 반환했습니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notice"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notice:
    get:
      summary: 특정 공지사항 조회
      description: ID를 통해 특정 공지사항의 상세 정보를 조회합니다.
      tags:
        - Notices
      parameters:
        - name: id
          in: query
          description: 조회할 공지사항의 ID
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: 성공적으로 공지사항을 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 공지사항 생성
      description: 새로운 공지사항을 생성합니다.
      tags:
        - Notices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeCreateRequest"
            example:
              title: "정전 안내"
              content: "9월 20일 오전 10시에 정전 예정입니다."
              is_important: true
      responses:
        "201":
          description: 공지사항이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 공지사항 수정
      description: 기존 공지사항의 내용을 수정합니다.
      tags:
        - Notices
      parameters:
        - name: id
          in: query
          description: 수정할 공지사항의 ID
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeCreateRequest"
            example:
              title: "정전 안내 (수정)"
              content: "9월 20일 오전 10시에 정전 예정입니다. (시간 변경)"
              is_important: false
      responses:
        "200":
          description: 공지사항이 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notice"
        "400":
          description: 잘못된 요청 (ID 형식 오류 또는 필수 필드 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 공지사항 삭제
      description: 특정 공지사항을 삭제합니다.
      tags:
        - Notices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: 삭제할 공지사항의 ID
                  example: 23
              required:
                - id
            example:
              id: 23
      responses:
        "200":
          description: 공지사항이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Notice deleted successfully"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 공지사항을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/calendar:
    get:
      summary: 캘린더 일정 조회
      description: 전체 또는 특정 날짜의 캘린더 일정을 조회합니다.
      tags:
        - Calendar
      parameters:
        - name: date
          in: query
          description: 조회할 날짜 (YYYY-MM-DD 형식, 선택사항)
          required: false
          schema:
            type: string
            format: date
          example: "2025-09-19"
      responses:
        "200":
          description: 성공적으로 캘린더 일정을 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarList"
        "400":
          description: 잘못된 요청 (잘못된 날짜 형식)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: 새 캘린더 일정 생성
      description: 새로운 캘린더 일정을 생성합니다.
      tags:
        - Calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarCreateRequest"
            example:
              date: "2025-09-19"
              rollCallType: null
              paymentType: null
      responses:
        "201":
          description: 캘린더 일정이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calendar"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: 기존 캘린더 일정 수정
      description: 기존 캘린더 일정의 내용을 수정합니다.
      tags:
        - Calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarUpdateRequest"
            example:
              id: 1
              paymentType: "cash"
      responses:
        "200":
          description: 캘린더 일정이 성공적으로 수정되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calendar"
        "400":
          description: 잘못된 요청 (ID 형식 오류 또는 필수 필드 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 수정할 캘린더 일정을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: 캘린더 일정 삭제
      description: 특정 캘린더 일정을 삭제합니다.
      tags:
        - Calendar
      parameters:
        - name: id
          in: query
          description: 삭제할 캘린더 일정의 ID
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: 캘린더 일정이 성공적으로 삭제되었습니다.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Calendar event deleted successfully"
        "400":
          description: 잘못된 요청 (ID 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 삭제할 캘린더 일정을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/subscriptions:
    post:
      summary: FCM 구독 생성
      description: FCM 토큰을 등록하여 푸시 알림을 받을 수 있도록 구독합니다.
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCreateRequest"
            example:
              fcm_token: "fcm_token_example_12345"
              student_no: "20243105"
              platform: "ios"
      responses:
        "200":
          description: 구독이 성공적으로 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/subscriptions/status:
    get:
      summary: FCM 구독 상태 조회
      description: FCM 토큰을 통해 현재 구독 상태를 조회합니다.
      tags:
        - Notifications
      parameters:
        - name: fcm_token
          in: query
          description: 조회할 FCM 토큰
          required: true
          schema:
            type: string
          example: "fcm_token_example_12345"
      responses:
        "200":
          description: 구독 상태를 성공적으로 반환했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
        "400":
          description: 잘못된 요청 (fcm_token 파라미터 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: 구독을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notifications:
    post:
      summary: 수동 알림 발송
      description: 관리자가 수동으로 모든 구독자에게 알림을 발송합니다.
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSendRequest"
            example:
              title: "긴급 공지"
              content: "제2정릉생활관 정보자원관리원 화재 안내"
              notice_id: 123
      responses:
        "200":
          description: 알림이 성공적으로 발송되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResult"
        "400":
          description: 잘못된 요청 (필수 필드 누락)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/webhook/notify:
    post:
      summary: Supabase 웹훅 (내부용)
      description: Supabase에서 새 공지사항이 생성될 때 자동으로 호출되는 웹훅입니다 (굳이 조작할 필요 없음).
      tags:
        - Notifications
      security:
        - WebhookSecret: []
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: 웹훅이 성공적으로 처리되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResult"
        "401":
          description: 인증 실패 (잘못된 웹훅 시크릿)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/bill/presign:
    post:
      summary: 관리비 고지서 업로드 URL 발급
      description: S3에 관리비 고지서 이미지를 업로드하기 위한 임시 presigned URL을 발급합니다. 발급된 URL은 5분간 유효합니다.
      tags:
        - Bills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillPresignRequest"
            example:
              contentType: "image/jpeg"
              ext: "jpg"
              roomId: "101"
              type: "water"
              year: "2025"
              month: "9"
      responses:
        "200":
          description: Presigned URL이 성공적으로 발급되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillPresignResponse"
        "400":
          description: 잘못된 요청 (필수 필드 누락 또는 유효하지 않은 값)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingField:
                  value:
                    error: "roomId is required."
                invalidType:
                  value:
                    error: "Invalid bill type. Must be one of: water, electricity, gas"
                invalidContentType:
                  value:
                    error: "contentType 'image/bmp' not allowed"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/bill/image:
    get:
      summary: 관리비 고지서 이미지 조회
      description: 저장된 관리비 고지서 이미지를 조회하기 위한 임시 다운로드 URL을 발급합니다. 발급된 URL은 5분간 유효합니다.
      tags:
        - Bills
      parameters:
        - name: roomId
          in: query
          description: 호실 번호
          required: true
          schema:
            type: string
          example: "101"
        - name: type
          in: query
          description: 관리비 유형
          required: true
          schema:
            type: string
            enum: [water, electricity, gas]
          example: "water"
        - name: year
          in: query
          description: 연도
          required: true
          schema:
            type: string
          example: "2025"
        - name: month
          in: query
          description: 월
          required: true
          schema:
            type: string
          example: "9"
      responses:
        "200":
          description: 이미지 정보가 성공적으로 반환되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillImageResponse"
        "400":
          description: 잘못된 요청 (필수 쿼리 파라미터 누락 또는 유효하지 않은 값)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingParam:
                  value:
                    error: "roomId is required."
                invalidType:
                  value:
                    error: "Invalid bill type. Must be one of: water, electricity, gas"
        "404":
          description: 이미지를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "No image found for the specified criteria."
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    get:
      summary: Cognito Hosted UI 로그인 시작
      description: 절대 URL(화이트리스트 오리진)로 리디렉트 정보를 담아 로그인 플로우를 시작합니다. 서버는 PKCE와 state를 설정하고 Cognito Hosted UI로 302 리다이렉트합니다.
      tags:
        - Auth
      security: []
      deprecated: true
      parameters:
        - name: redirect
          in: query
          description: 로그인 완료 후 리다이렉트할 절대 URL (허용 오리진만)
          required: false
          schema:
            type: string
          examples:
            admin:
              value: "https://kmusds.surge.sh/home"
            student:
              value: "https://student-app-sigma-red.vercel.app/home"
            local:
              value: "http://localhost:3000/docs"
      responses:
        "302":
          description: Cognito Hosted UI로 리다이렉트

  /auth/callback:
    get:
      summary: Cognito 콜백
      description: Cognito가 Authorization Code와 state를 전달하는 엔드포인트. 서버는 코드 교환 후 `session` 쿠키를 설정하고 최초 요청된 redirect(허용 오리진)로 302 리다이렉트하며, 미허용 또는 누락 시 기본 경로로 폴백합니다.
      tags:
        - Auth
      security: []
      deprecated: true
      responses:
        "302":
          description: 로그인 완료 후 최종 리다이렉트
        "400":
          description: state/code 오류

  /auth/logout:
    get:
      summary: 로그아웃
      description: 요청의 redirect 파라미터(절대 URL)가 허용 오리진이며 Cognito에 사전 등록된 로그아웃 URL 목록에 존재하면 해당 URL로 최종 리다이렉트합니다. 조건 불일치 시 기본 로그아웃 경로로 폴백합니다.
      tags:
        - Auth
      security: []
      deprecated: true
      parameters:
        - name: redirect
          in: query
          description: 로그아웃 완료 후 리다이렉트할 절대 URL (허용 오리진 + Cognito 등록 URL)
          required: false
          schema:
            type: string
          examples:
            admin:
              value: "https://kmusds.surge.sh/auth"
            student:
              value: "https://student-app-sigma-red.vercel.app/auth"
            local:
              value: "http://localhost:3000/auth"
      responses:
        "302":
          description: 로그아웃 처리 후 최종 리다이렉트 또는 Cognito 로그아웃으로 리다이렉트
        "400":
          description: redirect 누락/허용되지 않은 오리진
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    WebhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
      description: 웹훅 인증을 위한 시크릿 키

  schemas:
    Room:
      type: object
      description: 호실 정보
      properties:
        id:
          type: integer
          description: 호실 ID
          example: 1
        name:
          type: string
          description: 호실명 (예 101호)
          example: "101호"
        floor:
          type: integer
          description: 층수
          example: 1
        headcount:
          type: integer
          description: 수용 인원
          example: 4

    Student:
      type: object
      description: 학생 정보
      properties:
        id:
          type: integer
          description: 학생 ID
          example: 1
        name:
          type: string
          description: 학생명
          example: "홍길동"
        studentIdNum:
          type: string
          description: 학번
          example: "20240001"
        affiliation:
          type: string
          description: 소속
          example: "공과대학"
        major:
          type: string
          description: 전공
          example: "컴퓨터공학부"
        roomNumber:
          type: integer
          description: 호실 번호
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식)
          example: "2024-09-01"
        createdAt:
          type: string
          format: date-time
          description: 생성일시
          example: "2024-09-01T10:00:00Z"

    StudentCreateRequest:
      type: object
      description: 학생 생성 요청
      required:
        - name
        - studentIdNum
      properties:
        name:
          type: string
          description: 학생명
          example: "이현구"
        studentIdNum:
          type: string
          description: 학번
          example: "20243105"
        roomNumber:
          type: integer
          description: 호실 번호 (선택사항)
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2024-02-26"

    StudentUpdateRequest:
      type: object
      description: 학생 수정 요청
      required:
        - studentIdNum
      properties:
        studentIdNum:
          type: string
          description: 학번
          example: "20243105"
        name:
          type: string
          description: 학생명 (선택사항)
          example: "이현구"
        roomNumber:
          type: integer
          description: 호실 번호 (선택사항)
          example: 101
        checkInDate:
          type: string
          format: date
          description: 입사 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2024-02-27"

    Notice:
      type: object
      description: 공지사항 정보
      properties:
        id:
          type: integer
          description: 공지사항 ID
          example: 1
        title:
          type: string
          description: 제목
          example: "정전 안내"
        content:
          type: string
          description: 내용
          example: "9월 20일 오전 10시에 정전 예정입니다."
        date:
          type: string
          format: date
          description: 작성일 (YYYY-MM-DD 형식)
          example: "2024-09-15"
        is_important:
          type: boolean
          description: 중요 공지 여부
          example: true

    NoticeCreateRequest:
      type: object
      description: 공지사항 생성/수정 요청
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: 공지사항 제목
          example: "정전 안내"
        content:
          type: string
          description: 공지사항 내용
          example: "9월 20일 오전 10시에 정전 예정입니다."
        is_important:
          type: boolean
          description: 중요 공지 여부
          default: false
          example: true

    Calendar:
      type: object
      description: 캘린더 일정 정보
      properties:
        id:
          type: integer
          description: 일정 ID
          example: 1
        date:
          type: string
          format: date
          description: 일정 날짜 (YYYY-MM-DD 형식)
          example: "2025-09-19"
        rollCallType:
          type: string
          description: 점호 타입
          example: "night"
        paymentType:
          type: string
          description: 결제 타입
          example: "card"

    CalendarList:
      type: object
      description: 캘린더 일정 목록
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Calendar"

    CalendarCreateRequest:
      type: object
      description: 캘린더 일정 생성 요청
      required:
        - date
        - rollCallType
        - paymentType
      properties:
        date:
          type: string
          format: date
          description: 일정 날짜 (YYYY-MM-DD 형식)
          example: "2025-09-19"
        rollCallType:
          type: string
          description: 점호 타입
          example: "night"
        paymentType:
          type: string
          description: 결제 타입
          example: "card"

    CalendarUpdateRequest:
      type: object
      description: 캘린더 일정 수정 요청
      required:
        - id
      properties:
        id:
          type: integer
          description: 수정할 일정 ID
          example: 1
        date:
          type: string
          format: date
          description: 일정 날짜 (YYYY-MM-DD 형식, 선택사항)
          example: "2025-09-19"
        rollCallType:
          type: string
          description: 점호 타입 (선택사항)
          example: "night"
        paymentType:
          type: string
          description: 결제 타입 (선택사항)
          example: "cash"

    Error:
      type: object
      description: 에러 응답
      properties:
        error:
          type: string
          description: 에러 메시지
          example: "Invalid request parameters"

    Subscription:
      type: object
      description: FCM 구독 정보
      properties:
        id:
          type: integer
          description: 구독 ID
          example: 1
        fcm_token:
          type: string
          description: FCM 토큰
          example: "fcm_token_example_12345"
        student_no:
          type: string
          description: 학번
          example: "20243105"
        is_active:
          type: boolean
          description: 활성화 상태
          example: true
        platform:
          type: string
          description: 플랫폼
          example: "ios"
        created_at:
          type: string
          format: date-time
          description: 생성일시
          example: "2024-09-01T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: 수정일시
          example: "2024-09-01T10:00:00Z"

    SubscriptionCreateRequest:
      type: object
      description: FCM 구독 생성 요청
      required:
        - fcm_token
        - student_no
      properties:
        fcm_token:
          type: string
          description: FCM 토큰
          example: "fcm_token_example_12345"
        student_no:
          type: string
          description: 학번
          example: "20192762"
        platform:
          type: string
          description: 플랫폼 (기본값 web)
          default: "web"
          example: "web"

    SubscriptionStatus:
      type: object
      description: FCM 구독 상태
      properties:
        active:
          type: boolean
          description: 활성화 상태
          example: true
        subscription_id:
          type: integer
          description: 구독 ID
          example: 1
        student_no:
          type: string
          description: 학번
          example: "20243105"
        platform:
          type: string
          description: 플랫폼
          example: "ios"
        created_at:
          type: string
          format: date-time
          description: 생성일시
          example: "2024-09-01T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: 수정일시
          example: "2024-09-01T10:00:00Z"

    NotificationSendRequest:
      type: object
      description: 수동 알림 발송 요청
      required:
        - title
        - content
        - notice_id
      properties:
        title:
          type: string
          description: 알림 제목
          example: "긴급 공지"
        content:
          type: string
          description: 알림 내용
          example: "내일 시험 일정이 변경되었습니다."
        notice_id:
          type: integer
          description: 공지사항 ID
          example: 123

    NotificationResult:
      type: object
      description: 알림 발송 결과
      properties:
        success:
          type: boolean
          description: 발송 성공 여부
          example: true
        total_subscriptions:
          type: integer
          description: 전체 구독자 수
          example: 150
        success_count:
          type: integer
          description: 성공한 발송 수
          example: 145
        failure_count:
          type: integer
          description: 실패한 발송 수
          example: 5
        invalid_tokens:
          type: array
          items:
            type: string
          description: 무효한 토큰 리스트
          example: ["token1", "token2"]
        failed_tokens:
          type: array
          items:
            type: string
          description: 실패한 토큰 리스트
          example: ["token3"]

    WebhookPayload:
      type: object
      description: Supabase 웹훅 페이로드
      properties:
        type:
          type: string
          description: 이벤트 타입
          example: "INSERT"
        record:
          type: object
          description: 공지사항 데이터
          properties:
            id:
              type: integer
              description: 공지사항 ID
              example: 123
            title:
              type: string
              description: 제목
              example: "새 공지사항"
            content:
              type: string
              description: 내용
              example: "공지사항 내용입니다."

    BillPresignRequest:
      type: object
      description: 관리비 고지서 업로드 URL 발급 요청
      required:
        - roomId
        - type
        - year
        - month
      properties:
        contentType:
          type: string
          description: |
            이미지 MIME 타입 (기본값: application/octet-stream)
            허용 타입: image/jpeg, image/jpg, image/png, image/gif, image/webp, image/bmp, image/tiff, image/svg+xml
          default: "application/octet-stream"
          example: "image/jpeg"
        ext:
          type: string
          description: 파일 확장자 (선택사항, 현재 미사용)
          example: "jpg"
        roomId:
          type: string
          description: 호실 번호
          example: "101"
        type:
          type: string
          description: 관리비 유형
          enum: [water, electricity, gas]
          example: "water"
        year:
          type: string
          description: 연도
          example: "2025"
        month:
          type: string
          description: 월
          example: "9"

    BillPresignResponse:
      type: object
      description: 관리비 고지서 업로드 URL 발급 응답
      properties:
        url:
          type: string
          description: S3 업로드용 presigned PUT URL (유효기간 5분)
          example: "https://bucket-name.s3.ap-northeast-2.amazonaws.com/bills/2025/9/101/water?X-Amz-Algorithm=..."
        key:
          type: string
          description: S3에 저장될 객체 키
          example: "bills/2025/9/101/water"
        headers:
          type: object
          description: 업로드 시 포함해야 할 HTTP 헤더
          properties:
            Content-Type:
              type: string
              description: Content-Type 헤더 값
              example: "image/jpeg"

    BillImageResponse:
      type: object
      description: 관리비 고지서 이미지 조회 응답
      properties:
        key:
          type: string
          description: S3 객체 키
          example: "bills/2025/9/101/water"
        url:
          type: string
          description: 이미지 다운로드용 presigned GET URL (유효기간 5분)
          example: "https://bucket-name.s3.ap-northeast-2.amazonaws.com/bills/2025/9/101/water?X-Amz-Algorithm=..."
        lastModified:
          type: string
          format: date-time
          description: 파일 최종 수정 일시 (ISO 8601 형식)
          example: "2025-09-21T09:39:05.000Z"
        size:
          type: integer
          description: 파일 크기 (bytes)
          example: 2132

tags:
  - name: Rooms
    description: 호실 관련 API
  - name: Students
    description: 학생 관련 API
  - name: Notices
    description: 공지사항 관련 API
  - name: Calendar
    description: 캘린더 일정 관련 API
  - name: Bills
    description: 관리비 고지서 관련 API
  - name: Notifications
    description: FCM 푸시 알림 관련 API
  - name: Auth
    description: 인증 관련 API (스웨거에서는 동작하지 않음)
