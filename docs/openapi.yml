          example: "2025-11-16"

    PointBulkCreateRequest:
      type: object
      description: 상벌점 대량 부여 요청
      required:
        - studentIds
        - type
        - score
        - reason
        - date
      properties:
        studentIds:
          type: array
          description: 학생 학번 배열
          items:
            type: string
          example: ["20240001", "20240002", "20240003"]
        type:
          type: string
          description: 상벌점 유형
          enum: [MERIT, DEMERIT]
          example: "DEMERIT"
        score:
          type: integer
          description: 점수 (양수만 가능)
          minimum: 1
          example: 1
        reason:
          type: string
          description: 사유
          example: "소음"
        date:
          type: string
          format: date
          description: 부여 날짜 (YYYY-MM-DD 형식)
          example: "2025-11-16"

    PointBulkCreateResponse:
      type: object
      description: 상벌점 대량 부여 응답
      properties:
        created:
          type: integer
          description: 생성된 레코드 수
          example: 3
        items:
          type: array
          description: 생성된 상벌점 레코드 목록
          items:
            $ref: "#/components/schemas/Point"

